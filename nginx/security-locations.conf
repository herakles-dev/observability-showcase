# Security: Block common attack paths with 444 (connection reset)
# Include this in your nginx server blocks: include /etc/nginx/snippets/security-locations.conf;

# Block .env, .git, and sensitive files
location ~ /\.(env|git|svn|htaccess|htpasswd|DS_Store) {
    return 444;
}

# Block WordPress probes (if not running WordPress)
location ~ ^/(wp-admin|wp-login|wp-includes|wp-content|xmlrpc\.php) {
    return 444;
}

# Block phpMyAdmin probes
location ~ ^/(phpmyadmin|pma|myadmin|mysql|phpMyAdmin|dbadmin) {
    return 444;
}

# Block shell/backdoor probes
location ~ \.(php|asp|aspx|jsp|cgi)$ {
    # Only enable if you don't run PHP
    # return 444;
}

# Block common vulnerability scanners
location ~ ^/(admin|administrator|manager|console|shell|eval|config|backup|dump) {
    return 444;
}

# Block SQL injection attempts in URL
location ~* (union|select|insert|update|delete|drop|concat|char\(|0x) {
    return 444;
}
