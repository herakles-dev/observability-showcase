# Default server - catch malicious requests
# This server catches requests that don't match any other server_name
# AND blocks known attack patterns

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    # Block malicious requests (uses map from 00-security-map.conf)
    if ($block_request) {
        return 444;
    }
    
    # Return 444 for all other requests to undefined hosts
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    
    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    
    # Block malicious requests
    if ($block_request) {
        return 444;
    }
    
    return 444;
}
