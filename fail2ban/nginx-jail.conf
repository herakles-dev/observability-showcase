# Nginx bot/scanner protection
[nginx-botscan]
enabled = true
port = http,https
filter = nginx-botscan
logpath = /var/log/nginx/access.log
maxretry = 3
findtime = 300
bantime = 86400

# Nginx HTTP auth failures
[nginx-http-auth]
enabled = true
filter = nginx-http-auth
port = http,https
logpath = /var/log/nginx/error.log
maxretry = 3
bantime = 3600
